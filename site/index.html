<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spell Quest Junior</title>
  <link rel="stylesheet" href="styles.css?v=20260514-bpmf-v3-preview">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="app-header">
    <div class="platform-cloud cloud-a" aria-hidden="true"></div>
    <div class="platform-cloud cloud-b" aria-hidden="true"></div>
    <div class="coin-row" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="hero-copy">
      <p class="eyebrow">Spell Quest Junior</p>
      <h1>Spelling Bee Adventure</h1>
      <p class="hero-note">
        <span data-bpmf-text="國小二年級" data-bpmf="ㄍㄨㄛˊ ㄒㄧㄠˇ ㄦˋ ㄋㄧㄢˊ ㄐㄧˊ"></span>
        <span>/ Grade 2</span>
        <span>spelling practice lab</span>
      </p>
      <div class="hero-actions" role="navigation" aria-label="Primary modes">
        <button class="mode-tab active" type="button" data-mode="practice">
          <span class="button-icon" aria-hidden="true"></span>
          <span data-bpmf-text="練習模式" data-bpmf="ㄌㄧㄢˋ ㄒㄧˊ ㄇㄛˊ ㄕˋ"></span>
        </button>
        <button class="mode-tab" type="button" data-mode="exam">
          <span class="button-icon trophy" aria-hidden="true"></span>
          <span data-bpmf-text="考試模式" data-bpmf="ㄎㄠˇ ㄕˋ ㄇㄛˊ ㄕˋ"></span>
        </button>
      </div>
    </div>
    <div class="hero-art" aria-hidden="true">
      <img src="assets/images/adventure-mascot.svg" alt="">
    </div>
  </header>

  <main id="main" class="layout">
    <aside class="side-panel" aria-label="Learning dashboard">
      <img class="world-map" src="assets/images/world-map.svg" alt="">
      <section class="stat-grid" aria-label="Progress">
        <div>
          <strong id="totalWords">0</strong>
          <span class="static-zhuyin" aria-label="單字">
            <span class="taiwan-zhuyin" aria-hidden="true">
              <span class="bpmf-unit"><span class="bpmf-han">單</span><span class="bpmf-mark"><span class="bpmf-sound"><span class="bpmf-symbol">ㄉ</span><span class="bpmf-symbol">ㄢ</span></span><span class="bpmf-tone bpmf-tone-empty">ˊ</span></span></span>
              <span class="bpmf-unit"><span class="bpmf-han">字</span><span class="bpmf-mark bpmf-mark-short"><span class="bpmf-sound"><span class="bpmf-symbol">ㄗ</span></span><span class="bpmf-tone">ˋ</span></span></span>
            </span>
          </span>
        </div>
        <div>
          <strong id="knownWords">0</strong>
          <span class="static-zhuyin" aria-label="已熟">
            <span class="taiwan-zhuyin" aria-hidden="true">
              <span class="bpmf-unit"><span class="bpmf-han">已</span><span class="bpmf-mark bpmf-mark-short"><span class="bpmf-sound"><span class="bpmf-symbol">ㄧ</span></span><span class="bpmf-tone">ˇ</span></span></span>
              <span class="bpmf-unit"><span class="bpmf-han">熟</span><span class="bpmf-mark"><span class="bpmf-sound"><span class="bpmf-symbol">ㄕ</span><span class="bpmf-symbol">ㄨ</span></span><span class="bpmf-tone">ˊ</span></span></span>
            </span>
          </span>
        </div>
        <div>
          <strong id="starWords">0</strong>
          <span class="static-zhuyin" aria-label="重點">
            <span class="taiwan-zhuyin" aria-hidden="true">
              <span class="bpmf-unit"><span class="bpmf-han">重</span><span class="bpmf-mark bpmf-mark-long"><span class="bpmf-sound"><span class="bpmf-symbol">ㄓ</span><span class="bpmf-symbol">ㄨ</span><span class="bpmf-symbol">ㄥ</span></span><span class="bpmf-tone">ˋ</span></span></span>
              <span class="bpmf-unit"><span class="bpmf-han">點</span><span class="bpmf-mark bpmf-mark-long"><span class="bpmf-sound"><span class="bpmf-symbol">ㄉ</span><span class="bpmf-symbol">ㄧ</span><span class="bpmf-symbol">ㄢ</span></span><span class="bpmf-tone">ˇ</span></span></span>
            </span>
          </span>
        </div>
      </section>
      <section class="audio-panel">
        <h2><span data-bpmf-text="錄音參考" data-bpmf="ㄌㄨˋ ㄧㄣ ㄘㄢ ㄎㄠˇ"></span></h2>
        <label for="audioSelect"><span data-bpmf-text="考題音檔" data-bpmf="ㄎㄠˇ ㄊㄧˊ ㄧㄣ ㄉㄤˇ"></span></label>
        <select id="audioSelect">
          <option value="assets/audio/intermediate-mock-test-2.m4a">Intermediate Mock Test 2</option>
          <option value="assets/audio/advanced-mock-test-2.m4a">Advanced Mock Test 2</option>
        </select>
        <audio id="sourceAudio" controls preload="metadata" src="assets/audio/intermediate-mock-test-2.m4a"></audio>
      </section>
    </aside>

    <section class="workspace">
      <section class="toolbar" aria-label="Filters">
        <label>
          <span data-bpmf-text="搜尋" data-bpmf="ㄙㄡ ㄒㄩㄣˊ"></span>
          <input id="searchInput" type="search" placeholder="word, topic, source">
        </label>
        <label>
          <span data-bpmf-text="字頭" data-bpmf="ㄗˋ ㄊㄡˊ"></span>
          <select id="initialFilter">
            <option value="all">All</option>
          </select>
        </label>
        <label>
          <span data-bpmf-text="程度" data-bpmf="ㄔㄥˊ ㄉㄨˋ"></span>
          <select id="levelFilter">
            <option value="all">All</option>
            <option value="starter">starter</option>
            <option value="bridge">bridge</option>
            <option value="challenge">challenge</option>
          </select>
        </label>
        <label>
          <span data-bpmf-text="主題" data-bpmf="ㄓㄨˇ ㄊㄧˊ"></span>
          <select id="topicFilter">
            <option value="all">All</option>
          </select>
        </label>
        <button id="shuffleButton" class="icon-button" type="button" title="Shuffle">
          <span class="button-icon shuffle" aria-hidden="true"></span>
          <span data-bpmf-text="洗牌" data-bpmf="ㄒㄧˇ ㄆㄞˊ"></span>
        </button>
        <button id="clearFiltersButton" class="icon-button reset" type="button" title="Clear filters">
          <span class="button-icon clear" aria-hidden="true"></span>
          <span data-bpmf-text="清除篩選" data-bpmf="ㄑㄧㄥ ㄔㄨˊ ㄕㄞ ㄒㄩㄢˇ"></span>
        </button>
        <p id="filterStatus" class="filter-status" aria-live="polite"></p>
      </section>

      <section id="practiceView" class="mode-view active" aria-label="Practice mode">
        <article class="word-card">
          <div class="card-topline">
            <span id="wordSource" class="pill">source</span>
            <span id="wordLevel" class="pill level">level</span>
            <span id="wordStar" class="pill star hidden"><span data-bpmf-text="重點" data-bpmf="ㄓㄨㄥˋ ㄉㄧㄢˇ"></span></span>
          </div>
          <div class="word-main">
            <div>
              <p class="card-label"><span data-bpmf-text="今日單字" data-bpmf="ㄐㄧㄣ ㄖˋ ㄉㄢ ㄗˋ"></span></p>
              <h2 id="wordText">word</h2>
              <p id="wordPos" class="pos">pos</p>
            </div>
            <button id="speakButton" class="round-button" type="button" title="Speak word" aria-label="Speak word">
              <span class="speaker-icon" aria-hidden="true"></span>
            </button>
          </div>
          <div class="meaning-grid">
            <section>
              <div class="section-heading">
                <h3><span data-bpmf-text="意思" data-bpmf="ㄧˋ ㄙ˙"></span></h3>
                <button id="speakMeaningZh" class="mini-speak" type="button">
                  <span class="speaker-icon mini" aria-hidden="true"></span>
                  <span data-bpmf-text="中文" data-bpmf="ㄓㄨㄥ ㄨㄣˊ"></span>
                </button>
              </div>
              <p id="meaningText">meaning</p>
            </section>
            <section>
              <div class="section-heading">
                <h3><span data-bpmf-text="情境" data-bpmf="ㄑㄧㄥˊ ㄐㄧㄥˋ"></span></h3>
                <button id="speakTopicZh" class="mini-speak" type="button">
                  <span class="speaker-icon mini" aria-hidden="true"></span>
                  <span data-bpmf-text="中文" data-bpmf="ㄓㄨㄥ ㄨㄣˊ"></span>
                </button>
              </div>
              <p id="topicText">topic</p>
            </section>
          </div>
          <section class="example-box">
            <div class="section-heading">
              <h3><span data-bpmf-text="英文例句" data-bpmf="ㄧㄥ ㄨㄣˊ ㄌㄧˋ ㄐㄩˋ"></span></h3>
              <div class="speak-pair">
                <button id="speakExampleEn" class="mini-speak" type="button">
                  <span class="speaker-icon mini" aria-hidden="true"></span>
                  EN
                </button>
                <button id="speakExampleZh" class="mini-speak zh" type="button">
                  <span class="speaker-icon mini" aria-hidden="true"></span>
                  <span data-bpmf-text="中文" data-bpmf="ㄓㄨㄥ ㄨㄣˊ"></span>
                </button>
              </div>
            </div>
            <p id="exampleText">Example sentence.</p>
            <p id="exampleZhText" class="example-translation">中文翻譯</p>
            <p id="exampleZhuyinText" class="zhuyin-line">注音</p>
            <p id="exampleZhHint" class="zh-hint">中文提示</p>
          </section>
          <section class="example-box muted">
            <div class="section-heading">
              <h3><span data-bpmf-text="應用任務" data-bpmf="ㄧㄥˋ ㄩㄥˋ ㄖㄣˋ ㄨˋ"></span></h3>
              <div class="speak-pair">
                <button id="speakUsageEn" class="mini-speak" type="button">
                  <span class="speaker-icon mini" aria-hidden="true"></span>
                  EN
                </button>
                <button id="speakUsageZh" class="mini-speak zh" type="button">
                  <span class="speaker-icon mini" aria-hidden="true"></span>
                  <span data-bpmf-text="中文" data-bpmf="ㄓㄨㄥ ㄨㄣˊ"></span>
                </button>
              </div>
            </div>
            <div id="contextTabs" class="context-tabs" aria-label="情境分類"></div>
            <p id="usageText">Usage prompt.</p>
            <p id="contextZhText" class="example-translation">中文翻譯</p>
            <p id="contextZhuyinText" class="zhuyin-line">注音</p>
            <p id="usageZhHint" class="zh-hint">中文任務</p>
            <p id="contextUsageZhuyin" class="zhuyin-line compact">注音</p>
          </section>
          <div class="letter-strip" id="practiceLetters" aria-label="Word letters"></div>
          <div class="card-actions">
            <button id="prevButton" type="button"><span data-bpmf-text="上一張" data-bpmf="ㄕㄤˋ ㄧˋ ㄓㄤ"></span></button>
            <button id="knownButton" type="button"><span data-bpmf-text="標記已熟" data-bpmf="ㄅㄧㄠ ㄐㄧˋ ㄧˇ ㄕㄨˊ"></span></button>
            <button id="nextButton" type="button"><span data-bpmf-text="下一張" data-bpmf="ㄒㄧㄚˋ ㄧˋ ㄓㄤ"></span></button>
          </div>
        </article>
      </section>

      <section id="examView" class="mode-view" aria-label="Exam mode">
        <article class="exam-card">
          <div class="exam-header">
            <div>
              <p class="card-label"><span data-bpmf-text="測驗卡" data-bpmf="ㄘㄜˋ ㄧㄢˋ ㄎㄚˇ"></span></p>
              <h2><span data-bpmf-text="聽音拼字" data-bpmf="ㄊㄧㄥ ㄧㄣ ㄆㄧㄣ ㄗˋ"></span></h2>
            </div>
            <div class="exam-difficulty" role="group" aria-label="Exam difficulty">
              <button class="difficulty-button active" type="button" data-exam-difficulty="low" aria-pressed="true">Low</button>
              <button class="difficulty-button" type="button" data-exam-difficulty="medium" aria-pressed="false">Medium</button>
              <button class="difficulty-button" type="button" data-exam-difficulty="high" aria-pressed="false">High</button>
            </div>
            <div class="score-pill"><span id="examScore">0</span> / <span id="examTotal">0</span></div>
          </div>
          <p class="exam-note">
            <span data-bpmf-text="先聽發音，再用字母卡拼出答案。" data-bpmf="ㄒㄧㄢ ㄊㄧㄥ ㄈㄚ ㄧㄣ，ㄗㄞˋ ㄩㄥˋ ㄗˋ ㄇㄨˇ ㄎㄚˇ ㄆㄧㄣ ㄔㄨ ㄉㄚˊ ㄢˋ。"></span>
          </p>
          <div class="exam-controls">
            <button id="playExamWord" class="icon-button" type="button">
              <span class="speaker-icon small" aria-hidden="true"></span>
              <span data-bpmf-text="播放單字" data-bpmf="ㄅㄛ ㄈㄤˋ ㄉㄢ ㄗˋ"></span>
            </button>
            <button id="playExamHintZh" class="icon-button" type="button">
              <span class="speaker-icon small" aria-hidden="true"></span>
              <span data-bpmf-text="播放提示" data-bpmf="ㄅㄛ ㄈㄤˋ ㄊㄧˊ ㄕˋ"></span>
            </button>
            <button id="newExamButton" class="icon-button" type="button">
              <span class="button-icon shuffle" aria-hidden="true"></span>
              <span data-bpmf-text="重新出題" data-bpmf="ㄔㄨㄥˊ ㄒㄧㄣ ㄔㄨ ㄊㄧˊ"></span>
            </button>
          </div>
          <div id="answerSlots" class="answer-slots" aria-label="Answer slots"></div>
          <div id="letterBank" class="letter-bank" aria-label="Letter bank"></div>
          <div id="examFeedback" class="feedback" role="status"></div>
          <div class="card-actions">
            <button id="eraseButton" type="button"><span data-bpmf-text="退一格" data-bpmf="ㄊㄨㄟˋ ㄧˋ ㄍㄜˊ"></span></button>
            <button id="checkButton" type="button"><span data-bpmf-text="檢查答案" data-bpmf="ㄐㄧㄢˇ ㄔㄚˊ ㄉㄚˊ ㄢˋ"></span></button>
            <button id="nextExamButton" type="button"><span data-bpmf-text="下一題" data-bpmf="ㄒㄧㄚˋ ㄧˋ ㄊㄧˊ"></span></button>
          </div>
          <section class="exam-hint">
            <h3><span data-bpmf-text="提示" data-bpmf="ㄊㄧˊ ㄕˋ"></span></h3>
            <p id="examHint">hint</p>
          </section>
        </article>
      </section>
    </section>
  </main>

  <template id="letterTemplate">
    <button class="letter-tile" type="button"></button>
  </template>

  <script src="app.js?v=20260514-bpmf-v3-preview"></script>
</body>
</html>
